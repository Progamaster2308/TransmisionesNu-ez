<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tnlogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transmisiones Nuñez</title>
  </head>
  <body>
    <form name="tn-admin-notifications" method="POST" action="/" data-netlify="true" netlify hidden>
      <input type="hidden" name="form-name" value="tn-admin-notifications" />
      <input type="text" name="subject" />
      <input type="text" name="reply_to" />
      <textarea name="message"></textarea>
      <input type="text" name="Empresa" />
      <input type="text" name="Origen" />
      <input type="text" name="Aviso" />
      <input type="text" name="Folio" />
      <input type="text" name="Cliente" />
      <input type="email" name="Correo del cliente" />
      <input type="text" name="Celular" />
      <input type="text" name="Vehiculo" />
      <input type="text" name="Fecha solicitada" />
      <input type="text" name="Fecha" />
      <input type="text" name="Hora" />
      <input type="text" name="Servicio" />
      <input type="text" name="Estado" />
      <input type="text" name="Total estimado" />
      <textarea name="Notas"></textarea>
      <textarea name="Detalle del pedido"></textarea>
      <textarea name="Descripcion de la falla"></textarea>
      <textarea name="Accion sugerida"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
